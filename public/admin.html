<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Administrador</title>
    <link rel="icon" type="image/x-icon" href="assets/bea.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
<header class="store-header">
        <div class="header-inner">
            <div class="header-name">
                <h1>Poções e Soluções</h1>
            </div>
            <nav class="header-nav">
                <a href="index.html">Voltar à loja</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="panel admin-panel">
            <h1>Cadastrar poção</h1>
            <form id="potionForm" class="potion-form">
                <div class="field">
                    <label for="name">Nome</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="field">
                    <label for="description">Descrição</label>
                    <textarea id="description" name="description" rows="2" required></textarea>
                </div>
                <div class="field">
                    <label for="photo">URL da imagem</label>
                    <input type="url" id="photo" name="photo" placeholder="https://...">
                </div>
                <div class="field">
                    <label for="price">Preço (R$)</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </div>

                <p id="formError" class="form-error" role="alert"></p>
                <button type="submit" class="potion-btn">Cadastrar</button>
            </form>
        </section>

        <section class="panel admin-list">
            <h1>Poções cadastradas</h1>
            <p id="listStatus" class="list-status"></p>
            <div id="potionList" class="potion-list"></div>
        </section>
    </main>
    <footer id="contact" class="store-contact">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="brand-name">Poções e Soluções</span>
                <p>Vendendo poções desde 1867</p>
                <div class="blinkies">
                    <img class="blinkie" src="assets/blinkies/bat_blinkie.gif" />
                    <img class="blinkie" src="assets/blinkies/comp_blinkie.gif" />
                    <img class="blinkie" src="assets/blinkies/ditto_blinkie.gif" />
                    <img class="blinkie" src="assets/blinkies/ghost_blinkie.gif" />
                    <img class="blinkie" src="assets/blinkies/triple_blinkie.gif" />
                    <img class="blinkie" src="assets/blinkies/eek_blinkie.gif" />
                </div>
            </div>
            <div class="footer-contact">
                <h2>Contato</h4>
                    <p>Lab. 201, Soto-Kanda 1-15-16</p>
                    <p>Chiyoda-ku, Tóquio - Japão</p>
                    <p>merigold@pocoesesolucoes.com</p>
                    <p>(00) 1234-5678</p>
            </div>
            <div class="footer-admin">
                <a href="index.html">Acesso à loja</a>
            </div>
        </div>
    </footer>
    <script src="admin.js"></script>
</body>

</html>
